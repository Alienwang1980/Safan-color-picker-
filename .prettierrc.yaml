# Prettier 配置 — 代码格式化
# 配合 ESLint 使用，eslint-config-prettier 避免规则冲突
printWidth: 100
tabWidth: 4
useTabs: false
semi: true
singleQuote: true
trailingComma: all
bracketSpacing: true
arrowParens: always
endOfLine: lf
overrides:
  - files: "*.html"
    options:
      tabWidth: 2
  - files: ["*.md", "*.yml", "*.yaml", "*.json"]
    options:
      tabWidth: 2
